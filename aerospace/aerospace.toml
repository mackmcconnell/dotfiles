# AeroSpace - Tiling Window Manager
# Docs: https://nikitabobko.github.io/AeroSpace/guide

config-version = 2

# Start at login
start-at-login = true

# Normalizations (keep on - prevents weird tree states)
enable-normalization-flatten-containers = true
enable-normalization-opposite-orientation-for-nested-containers = true

# Defaults
default-root-container-layout = 'tiles'
default-root-container-orientation = 'auto'

# Accordion padding (visible portion of hidden windows)
accordion-padding = 30

# Mouse follows focus when switching monitors
on-focused-monitor-changed = ['move-mouse monitor-lazy-center']

# Gaps
[gaps]
inner.horizontal = 8
inner.vertical = 8
outer.left = 8
outer.right = 8
outer.top = 8
outer.bottom = 8

# -- Main keybindings --

[mode.main.binding]

    # Focus (ctrl + hjkl)
    ctrl-h = 'focus left'
    ctrl-j = 'focus down'
    ctrl-l = 'focus right'

    # Move windows (ctrl + shift + hjkl)
    ctrl-shift-h = 'move left'
    ctrl-shift-j = 'move down'
    ctrl-shift-k = 'move up'
    ctrl-shift-l = 'move right'

    # Workspaces (alt + number)
    ctrl-shift-cmd-w = 'workspace 1'
    ctrl-shift-cmd-e = 'workspace 2'
    ctrl-shift-cmd-r = 'workspace 3'
    ctrl-shift-cmd-t = 'workspace 4'
    ctrl-shift-cmd-y = 'workspace 5'
    ctrl-shift-cmd-u = 'workspace 6'
    ctrl-shift-cmd-i = 'workspace 7'
    ctrl-shift-cmd-o = 'workspace 8'
    alt-9 = 'workspace 9'

    # Move window to workspace (alt + shift + number)
    alt-shift-1 = 'move-node-to-workspace 1'
    alt-shift-2 = 'move-node-to-workspace 2'
    alt-shift-3 = 'move-node-to-workspace 3'
    alt-shift-4 = 'move-node-to-workspace 4'
    alt-shift-5 = 'move-node-to-workspace 5'
    alt-shift-6 = 'move-node-to-workspace 6'
    alt-shift-7 = 'move-node-to-workspace 7'
    alt-shift-8 = 'move-node-to-workspace 8'
    alt-shift-9 = 'move-node-to-workspace 9'

    # Layout
    alt-slash = 'layout tiles horizontal vertical'
    alt-comma = 'layout accordion horizontal vertical'
    alt-f = ['flatten-workspace-tree', 'layout tiles accordion']
    alt-shift-space = 'layout floating tiling'

    # Resize
    alt-minus = 'resize smart -50'
    alt-equal = 'resize smart +50'
    alt-shift-equal = 'balance-sizes'

    # Open new Chrome window in current workspace
    ctrl-shift-b = '''exec-and-forget osascript -e '
tell application "Google Chrome"
    make new window
    activate
end tell'
'''

    # Modes
    alt-shift-semicolon = 'mode service'
    alt-r = 'mode resize'

# -- Resize mode --

[mode.resize.binding]
    h = 'resize width -50'
    j = 'resize height +50'
    k = 'resize height -50'
    l = 'resize width +50'
    enter = 'mode main'
    esc = 'mode main'

# -- Service mode (alt+shift+; to enter, esc to exit + reload) --

[mode.service.binding]
    esc = ['reload-config', 'mode main']
    r = ['flatten-workspace-tree', 'mode main']
    f = ['layout floating tiling', 'mode main']
    backspace = ['close-all-windows-but-current', 'mode main']

# -- Window rules --

# Float system preferences
[[on-window-detected]]
if.app-id = 'com.apple.systempreferences'
run = 'layout floating'

# Float Safari (used for ChatGPT voice popup)
[[on-window-detected]]
if.app-id = 'com.apple.Safari'
run = 'layout floating'
